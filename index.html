<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#185FA5"/>
<title>Fiberplane</title>
<link rel="manifest" href="manifest.json"/>
<link rel="stylesheet" href="style.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div id="app">

<!-- ── AUTH SCREEN ─────────────────────────── -->
<div class="screen active" id="authScreen">
  <div class="auth-logo">Fiber<span>plane</span></div>
  <div class="auth-tagline">Your smart cash book</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <div class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')">Sign In</div>
      <div class="auth-tab" id="tabReg" onclick="switchAuthTab('register')">Register</div>
    </div>
    <div id="authForm">
      <div class="form-group" id="nameGroup" style="display:none">
        <label class="form-label">Full Name</label>
        <input class="form-input" id="fName" type="text" placeholder="Your name" autocomplete="name"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="fEmail" type="email" placeholder="you@gmail.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="fPassword" type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn btn-primary" id="authSubmitBtn" onclick="handleAuth()">Sign In</button>
    <div
  class="auth-err"
  id="authErr"
  style="display:none">
</div>
      <div class="auth-divider">or</div>
   <button class="btn btn-google"
onclick="handleGoogleAuth()">
  <svg width="18" height="18" viewBox="0 0 48 48">
    <path fill="#4285F4" d="M45.5 24.5c0-1.5-.1-3-.4-4.5H24v8.5h12.1c-.5 2.7-2 5-4.3 6.5v5.4h7c4.1-3.8 6.7-9.4 6.7-15.9z"/>
    <path fill="#34A853" d="M24 46c6.5 0 11.9-2.1 15.9-5.8l-7-5.4C30.9 36.5 27.7 37.5 24 37.5c-6.1 0-11.3-4.1-13.1-9.7H3.6v5.6C7.5 41.4 15.2 46 24 46z"/>
    <path fill="#FBBC05" d="M10.9 27.8A13.6 13.6 0 0 1 10.4 24c0-1.3.2-2.6.5-3.8v-5.6H3.6A22 22 0 0 0 2 24c0 3.6.9 6.9 2.4 9.8l6.5-6z"/>
    <path fill="#EA4335" d="M24 10.5c3.5 0 6.6 1.2 9.1 3.5l6.8-6.8C35.8 3.4 30.4 1 24 1 15.2 1 7.5 5.6 3.6 12.6l6.5 5.6C12.7 14.6 17.9 10.5 24 10.5z"/>
  </svg>
  Continue with Google
</button>

<button class="btn btn-outline"
onclick="continueAsGuest()"
style="margin-top:10px">
  👀 Continue as Guest
</button>
    </div>
  </div>
</div>

<!-- ── MAIN SCREEN ─────────────────────────── -->
<div class="screen" id="mainScreen">
  <div class="header">
    <div class="header-top">
      <div class="logo">Fiberplane</div>
      <div class="header-right">
        <div class="book-selector" onclick="openBooksSheet()">
          <span class="book-icon" id="headerBookIcon">📒</span>
          <span class="book-name" id="headerBookName">My Book</span>
          <span class="chevron">▾</span>
        </div>
        <div class="avatar" id="userAvatar" onclick="showPage('profile')">U</div>
      </div>
    </div>
    <div class="month-scroll" id="monthScroll"></div>
  </div>
  <div class="page-scroll" id="pageContent"></div>
  <button class="fab" id="fabBtn" onclick="openTxnSheet(null)">+</button>
  <nav class="nav">
    <button class="nav-btn active"id="navDashboard" onclick="showPage('dashboard')">
      <span class="nav-icon">⊞</span>Dashboard
    </button>
    <button class="nav-btn" id="navTransactions" onclick="showPage('transactions')">
      <span class="nav-icon">≡</span>Entries
    </button>
    <button class="nav-btn" id="navCategories" onclick="showPage('categories')">
      <span class="nav-icon">⊕</span>Categories
    </button>
    <button class="nav-btn" id="navProfile" onclick="showPage('profile')">
      <span class="nav-icon">◎</span>Profile
    </button>
  </nav>
</div>

</div>

<!-- ── BOTTOM SHEET ── -->
<div class="sheet-bg" id="sheetBg" onclick="closeSheet(event)">
  <div class="sheet" id="sheetContent" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div id="sheetInner"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script type="module" src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
